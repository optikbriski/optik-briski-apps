dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ==========================================
  # 1. DATABASE & AUTH
  # ==========================================
  supabase_flutter: ^2.16.0
  intl: ^0.20.2

  # ==========================================
  # 2. KAMERA & AI
  # ==========================================
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.13.0
  image_picker: ^1.1.2

  # ==========================================
  # 3. ENTERPRISE UTILITIES
  # ==========================================
  geolocator: ^13.0.1
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.1
  file_picker: ^8.1.4
  fl_chart: ^0.69.0
  http: ^1.6.0
  barcode_widget: ^2.0.4

  # ==========================================
  # 4. KASIR & PRINTING
  # ==========================================
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  pdf: ^3.12.0
  printing: ^5.13.0
  print_bluetooth_thermal: ^1.1.6
  esc_pos_utils_plus: ^2.0.4
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  dio: ^5.7.0
  open_file: ^3.5.11
  package_info_plus: ^8.1.1
  easy_localization: ^3.0.7
  easy_logger: ^0.0.2
  image_cropper: ^8.0.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crop_your_image: ^2.0.0
  disk_space_plus: ^0.2.6
  google_mlkit_text_recognition: ^0.15.1
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.10.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
