name: optik_b_riski
description: "Enterprise ERP System for Optik B. Riski"
publish_to: 'none'
version: 1.2.1+7

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ==========================================
  # 1. DATABASE & AUTH (SUPABASE)
  # ==========================================
  supabase_flutter: ^2.0.2
  intl: ^0.20.2

  # ==========================================
  # 2. MESIN LIVE KAMERA & AI (ABSENSI MUKA)
  # ==========================================
  camera: ^0.10.5+8
  google_mlkit_face_detection: ^0.11.0
  image_picker: ^1.2.2

  # ==========================================
  # 3. FITUR ENTERPRISE (GPS, UI, TOOLS)
  # ==========================================
  geolocator: ^10.1.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.4
  file_picker: ^11.0.2
  fl_chart: ^0.66.0

  # ==========================================
  # 4. FITUR KASIR & SCANNER
  # ==========================================
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  pdf: ^3.12.0
  printing: ^5.12.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  http: ^1.6.0
  barcode_widget: ^2.0.4
  dio: ^5.9.2
  open_file: ^3.5.11
  package_info_plus: ^9.0.1
  easy_localization: ^3.0.8
  easy_logger: ^0.0.2
  image_cropper: ^12.2.1
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/