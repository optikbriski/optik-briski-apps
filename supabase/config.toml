
[functions.send-invoice-email]
enabled = true
verify_jwt = false
import_map = "./functions/send-invoice-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-invoice-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-invoice-email/*.html" ]

[functions.aws-rekognition]
enabled = true
verify_jwt = true
entrypoint = "./functions/aws-rekognition/index.ts"

[functions.aws-face-liveness]
enabled = true
verify_jwt = true
entrypoint = "./functions/aws-face-liveness/index.ts"
